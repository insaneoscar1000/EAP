name: the_eap_app
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.5.4
dependencies:
  flutter:
    sdk: flutter
  intl: ^0.17.0
  provider: ^6.0.5
  get_it: ^7.6.4
  stacked: ^3.4.1
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  firebase_storage: ^12.0.1
  firebase_messaging: ^15.0.1
  cloud_firestore: ^5.4.4
  shared_preferences: ^2.2.2
  visibility_detector: ^0.4.0+2
  overlay_support: ^2.1.0
  flutter_spinkit: ^5.2.0
  url_launcher: ^6.3.1
  permission_handler: ^10.4.3
  dot_navigation_bar: ^1.0.2
  path_provider: ^2.1.3
  iconsax_plus: ^1.0.0
  image_picker: ^0.8.7+5
  dio: ^5.4.0
  pay_with_paystack: ^1.0.6
  table_calendar: ^3.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/images/
    - assets/icons/
  fonts:
    - family: Urbanist
      fonts:
        - asset: assets/fonts/Urbanist-Regular.ttf

name: the_eap_app
description: "A new Flutter project."
publish_to: "none"
version: 0.0.1+1

environment:
  sdk: ^3.5.4
dependencies:
  flutter:
    sdk: flutter
  intl: ^0.17.0
  provider: ^6.0.5
  get_it: ^7.6.4
  stacked: ^3.4.1
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  firebase_storage: ^12.0.1
  firebase_messaging: ^15.0.1
  cloud_firestore: ^5.4.4
  shared_preferences: ^2.2.2
  visibility_detector: ^0.4.0+2
  overlay_support: ^2.1.0
  flutter_spinkit: ^5.2.0
  url_launcher: ^6.3.1
  permission_handler: ^12.0.0+1
  dot_navigation_bar: ^1.0.2
  path_provider: ^2.1.5
  iconsax_plus: ^1.0.0
  image_picker: ^0.8.7+5
  dio: ^5.4.0
  table_calendar: ^3.0.8
  share_plus: ^7.2.1
  flutter_pdfview: ^1.4.1+1
  cloud_functions: ^5.1.3
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/logo.png"
flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/images/
    - assets/icons/
  fonts:
    - family: Urbanist
      fonts:
        - asset: assets/fonts/Urbanist-Regular.ttf
